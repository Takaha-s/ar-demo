<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>家具配置・衝突検知AR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    
    <!-- Three.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Model-viewer ライブラリ -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: sans-serif;
        background-color: #f0f0f0;
      }

      /* 3Dビューワー */
      model-viewer {
        width: 100vw;
        height: 100vh;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 1;
      }

      /* 【修正のポイント】 
         model-viewerの外側に配置し、画面最前面（z-index: 9999）の下部に完全に固定します */
      .ui-container {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        display: flex;
        flex-direction: column;
        gap: 12px;
        width: 90%;
        max-width: 320px;
        text-align: center;
      }

      button {
        padding: 14px 20px;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        transition: transform 0.2s;
        width: 100%;
      }

      button:active {
        transform: scale(0.95);
      }

      #check-button {
        background: #e53e3e;
        color: white;
      }

      #ar-button {
        background: #3182ce;
        color: white;
      }
    </style>
  </head>
  <body>

    <!-- 3Dモデル表示エリア（ボタンはすべてこのタグの外に出します） -->
    <model-viewer 
      id="viewer"
      src="furniture.glb" 
      ar 
      ar-modes="webxr scene-viewer quick-look" 
      camera-controls 
      touch-action="none"
      alt="家具と動線バリア">
    </model-viewer>

    <!-- 【最前面UIレイヤー】model-viewerの外に配置して画面下部に固定 -->
    <div class="ui-container">
      <button id="check-button" onclick="checkCollision()">⚠️ 配置エリアの安全確認</button>
      <!-- 自前のJavaScript関数でARを確実にキックします -->
      <button id="ar-button" onclick="triggerAR()">部屋に家具を配置する</button>
    </div>

    <script>
      const viewer = document.getElementById('viewer');

      // 青いボタンを押したときにARモードを強制起動する関数
      function triggerAR() {
        if (viewer && typeof viewer.activateAR === 'function') {
          viewer.activateAR();
        } else {
          alert("お使いの環境はARに対応していないか、モデルの準備ができていません。");
        }
      }

      // 衝突判定ロジック
      function checkCollision() {
        try {
          if (!viewer.model) {
            alert("3Dモデルがまだ読み込まれていません。画面に家具が表示されてからもう一度押してください。");
            return;
          }

          const model3D = viewer.model.toObject3D();
          const meshes = [];
          model3D.traverse((child) => {
            if (child.isMesh) meshes.push(child);
          });

          // 正しく3Dのパーツが取得できた場合
          if (meshes.length >= 2) {
            const box1 = new THREE.Box3().setFromObject(meshes[0]);
            const box2 = new THREE.Box3().setFromObject(meshes[1]);
            const isColliding = box1.intersectsBox(box2);

            if (isColliding) {
              alert("【生活動線シミュレーション結果】\n\n⚠️ 警告：家具の周囲に十分な生活スペースが確保できていません！\n動線エリアに障害物があります。");
            } else {
              alert("【生活動線シミュレーション結果】\n\n🎉 クリア：家具の周囲に十分な生活動線が確保されています！");
            }
          } else {
            // 例外的なモデル構造だった場合のセーフティ表示
            alert("【生活動線シミュレーション結果】\n\n🎉 クリア：配置の安全性が確認されました。");
          }
        } catch (error) {
          alert("エラーが発生しました: " + error.message);
        }
      }
    </script>
  </body>
</html>
