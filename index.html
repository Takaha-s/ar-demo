<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>生活動線可視化ARプロトタイプ</title>
    <!-- A-Frame と AR.js の読み込み -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <!-- マーカー（デフォルトのHIROマーク）を認識したときの中身 -->
      <a-marker preset="hiro">
        
        <!-- 【グループの親：位置の基準】 -->
        <a-entity position="0 0 0">
          
          <!-- ① 家具本体（例：青いチェスト、幅50cm×奥行50cm×高さ50cm） -->
          <a-box 
            position="0 0.25 0" 
            width="0.5" height="0.5" depth="0.5" 
            material="color: #3182ce; opacity: 1.0;">
          </a-box>

          <!-- ② 動線・安全バリア（例：家具の手前に50cm広がる半透明の黄色いエリア） -->
          <!-- opacity: 0.4 で半透明にし、wireframe: false で面として見せています -->
          <a-box 
            position="0 0.25 0.5" 
            width="0.5" height="0.5" depth="0.5" 
            material="color: #ecc94b; opacity: 0.4; transparent: true;">
          </a-box>
          
        </a-entity>

      </a-marker>

      <!-- AR用のカメラ -->
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
