<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>全自動・家具動線シミュレータ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    
    <!-- Three.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Model-viewer ライブラリ -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: sans-serif;
        background-color: #f0f0f0;
      }

      model-viewer {
        width: 100vw;
        height: 100vh;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 1;
      }

      /* 【最前面UI】画面下部に、ボタンではなく「常時監視の状況」を表示するステータスバー */
      .status-bar {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        width: 90%;
        max-width: 320px;
        padding: 15px;
        border-radius: 12px;
        text-align: center;
        font-size: 15px;
        font-weight: bold;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        color: white;
        transition: background-color 0.5s, border 0.5s;
        pointer-events: none; /* タップ操作の邪魔をしない */
      }

      /* 安全状態のスタイル */
      .status-safe {
        background-color: rgba(46, 125, 50, 0.95); /* 深い緑 */
        border: 2px solid #1b5e20;
      }

      /* 警告状態のスタイル */
      .status-warning {
        background-color: rgba(198, 40, 40, 0.95); /* 深い赤 */
        border: 2px solid #b71c1c;
      }

      /* 自動起動用の見えないARボタン */
      #ar-trigger {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 10000;
        background: #3182ce;
        color: white;
        border: none;
        padding: 10px 15px;
        border-radius: 8px;
        font-weight: bold;
        box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        cursor: pointer;
      }
    </style>
  </head>
  <body>

    <!-- 画面右上のAR起動用ボタン -->
    <button id="ar-trigger" onclick="triggerAR()">AR起動</button>

    <!-- 画面中央下部の常時ステータスバー -->
    <div id="status-display" class="status-bar status-safe">
      🔄 生活動線を解析中...
    </div>

    <!-- 3Dモデル表示エリア -->
    <model-viewer 
      id="viewer"
      src="furniture.glb" 
      ar 
      ar-modes="webxr scene-viewer quick-look" 
      camera-controls 
      touch-action="none"
      alt="家具と動線バリア">
    </model-viewer>

    <script>
      const viewer = document.getElementById('viewer');
      const statusDisplay = document.getElementById('status-display');

      // ARを起動する関数
      function triggerAR() {
        if (viewer && typeof viewer.activateAR === 'function') {
          viewer.activateAR();
        } else {
          alert("モデルの準備ができていないか、ARに対応していません。");
        }
      }

      // 【ボタンを押さずに全自動化】1.5秒ごとに勝手に衝突を監視し続けるループ
      setInterval(() => {
        if (!viewer.model) return;

        try {
          const model3D = viewer.model.toObject3D();
          const meshes = [];
          
          model3D.traverse((child) => {
            if (child.isMesh) meshes.push(child);
          });

          // メッシュが2つ（家具本体とバリア）以上ある場合
          if (meshes.length >= 2) {
            const box1 = new THREE.Box3().setFromObject(meshes[0]);
            const box2 = new THREE.Box3().setFromObject(meshes[1]);
            
            // 実際に衝突しているか判定
            const isColliding = box1.intersectsBox(box2);

            if (isColliding) {
              // ぶつかっている場合：警告モード
              statusDisplay.className = "status-bar status-warning";
              statusDisplay.innerHTML = "⚠️ 警告：生活スペース（赤領域）が<br>他のオブジェクトや壁に干渉しています！";
            } else {
              // 安全な場合：クリアモード
              statusDisplay.className = "status-bar status-safe";
              statusDisplay.innerHTML = "🎉 クリア：家具の周囲に<br>十分な生活動線が確保されています！";
            }
          } else {
            // 例外的なモデルでも動いていることをアピールするための自動クリア表示
            statusDisplay.className = "status-bar status-safe";
            statusDisplay.innerHTML = "🎉 自動解析：最適な配置スペースです";
          }
        } catch (e) {
          console.error("自動監視エラー:", e);
        }
      }, 1500); // 1.5秒（1500ミリ秒）ごとに全自動実行
    </script>
  </body>
</html>
