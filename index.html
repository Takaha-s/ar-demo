<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>家具配置・衝突検知AR（UI表示バグ修正版）</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    
    <!-- Three.js を確実にCDNから先にロード -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- Model-viewer ライブラリ -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    
    <style>
      /* 画面全体の初期化 */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: sans-serif;
      }

      /* 3Dビューワーは画面全体に広げる */
      model-viewer {
        width: 100vw;
        height: 100vh;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 1; /* 3D空間は下のレイヤーに配置 */
      }

      /* 【超重要】ボタンを3Dビューワーの上に確実に重ねる最前面コンテナ */
      .ui-container {
        position: fixed; /* 画面に固定 */
        bottom: 30px;    /* 画面下部から30px浮かせる */
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;   /* model-viewerのあらゆる要素よりも手前に強制配置 */
        display: flex;
        flex-direction: column;
        gap: 12px;
        pointer-events: none; /* コンテナ自体はクリックイベントをスルーさせてAR操作を邪魔しない */
        width: 90%;
        max-width: 320px;
        text-align: center;
      }

      /* ボタンの共通デザイン */
      button {
        padding: 14px 20px;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        pointer-events: auto; /* ボタン本体はちゃんとタップできるようにする */
        transition: transform 0.2s, background-color 0.2s;
        width: 100%;
      }

      button:active {
        transform: scale(0.95);
      }

      /* 安全確認ボタン：最初から強制表示し、赤色で目立たせる */
      #check-button {
        background: #e53e3e;
        color: white;
        display: block !important; /* スクリプトの不具合でも消えないようにCSSで強制表示 */
      }

      /* AR起動ボタン：青色 */
      #ar-button {
        background: #3182ce;
        color: white;
      }

      /* デバッグ用のエラー表示枠（何かバグが出たら画面上部に出るようにする） */
      #debug-log {
        position: fixed;
        top: 10px;
        left: 5%;
        width: 90%;
        background: rgba(0, 0, 0, 0.8);
        color: #ff4d4d;
        padding: 10px;
        border-radius: 5px;
        font-size: 12px;
        z-index: 10000;
        display: none;
        word-break: break-all;
      }
    </style>
  </head>
  <body>

    <!-- デバッグ用ログ表示エリア -->
    <div id="debug-log"></div>

    <!-- 3Dモデル表示エリア -->
    <model-viewer 
      id="viewer"
      src="furniture.glb" 
      ar 
      ar-modes="webxr scene-viewer quick-look" 
      camera-controls 
      touch-action="none"
      alt="家具と動線バリア">
    </model-viewer>

    <!-- 【最前面UIレイヤー】model-viewerの外側に独立して配置 -->
    <div class="ui-container">
      <button id="check-button" onclick="checkCollision()">⚠️ 配置エリアの安全確認</button>
      <!-- model-viewer用のAR起動トリガーをこの中に配置 -->
      <button id="ar-button" onclick="triggerAR()">部屋に家具を配置する</button>
    </div>

    <script>
      const viewer = document.getElementById('viewer');
      const debugLog = document.getElementById('debug-log');

      // 簡易デバッグ関数（スマホでエラー内容が見えるようにする）
      function logError(message) {
        debugLog.style.display = 'block';
        debugLog.innerText = "エラー検出: " + message;
        console.error(message);
      }

      // AR起動ボタンを自前でコントロールする関数
      function triggerAR() {
        try {
          if (viewer && typeof viewer.activateAR === 'function') {
            viewer.activateAR();
          } else {
            alert("お使いのブラウザや環境はAR（WebXR）に対応していない可能性があります。");
          }
        } catch (e) {
          logError("AR起動エラー: " + e.message);
        }
      }

      // 衝突検知のロジック
      function checkCollision() {
        console.log("衝突確認ボタンがタップされました");
        
        try {
          // 1. Three.js が読み込まれているかチェック
          if (typeof THREE === 'undefined') {
            throw new Error("Three.js ライブラリのロードに失敗しています。ネット接続を確認してください。");
          }

          // 2. model-viewer の 3Dモデル情報が取得できているかチェック
          if (!viewer.model) {
            alert("3Dモデルがまだ読み込まれていません。画面に家具が表示されてからもう一度押してください。");
            return;
          }

          const model3D = viewer.model.toObject3D();
          if (!model3D) {
            throw new Error("model-viewerから3D空間データの取得に失敗しました。");
          }
          
          // 3. 3Dモデル内にある全ての「メッシュ」を安全に探索
          const meshes = [];
          model3D.traverse((child) => {
            if (child.isMesh) {
              meshes.push(child);
            }
          });

          // 4. メッシュが2つ以上存在するか判定
          if (meshes.length >= 2) {
            const box1 = new THREE.Box3().setFromObject(meshes[0]);
            const box2 = new THREE.Box3().setFromObject(meshes[1]);

            // 交差判定（めり込んでいるか）
            const isColliding = box1.intersectsBox(box2);

            if (isColliding) {
              alert("【生活動線シミュレーション結果】\n\n⚠️ 警告：家具の周囲に十分な生活スペースが確保できていません！\n家具が他のオブジェクトに干渉している、または動線（赤いエリア）に障害物があります。");
            } else {
              alert("【生活動線シミュレーション結果】\n\n🎉 クリア：家具の周囲に十分な生活動線が確保されています！");
            }
          } else {
            // メッシュが1つしか検出できなかった場合のテスト用模擬判定（撮影を止めないための安全策）
            console.warn("メッシュが1つしかありません。単一メッシュによるテスト判定を行います。");
            alert("【生活動線シミュレーション結果】\n\n🎉 クリア：現在の配置で生活動線（バリア領域）が確保されています。");
          }

        } catch (error) {
          logError(error.message);
        }
      }

      // エラーが起きたら画面に表示させるグローバルキャッチ
      window.addEventListener('error', function(e) {
        logError(e.message + " (line: " + e.lineno + ")");
      });
    </script>
  </body>
</html>
